name: Refresh NVD, Match, Reason, and Collect Artifacts

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      reasoning_limit:
        description: "Maximum findings to send to reasoning"
        required: false
        default: "10"
      reasoning_all:
        description: "Run reasoning against all open findings"
        required: false
        type: boolean
        default: false
      skip_reasoning:
        description: "Skip the reasoning step when running the workflow manually"
        required: false
        type: boolean
        default: false
      nvd_sleep_seconds:
        description: "Delay between NVD page fetches"
        required: false
        default: "7"
      nvd_bootstrap_start_index:
        description: "NVD startIndex to use for bootstrap runs"
        required: false
        default: "300000"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: refresh-artifacts
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_REASONING_MODEL: ${{ secrets.GROQ_REASONING_MODEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Refresh data, matching, and reasoning
        env:
          REASONING_LIMIT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.reasoning_limit || '10' }}
          REASONING_ALL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.reasoning_all || 'false' }}
          SKIP_REASONING: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.skip_reasoning || 'false' }}
          NVD_SLEEP_SECONDS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.nvd_sleep_seconds || '7' }}
          NVD_BOOTSTRAP_START_INDEX: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.nvd_bootstrap_start_index || '300000' }}
        run: |
          uv run python - <<'PY'
          import os

          from backend.API import ingest
          from backend.API.scripts import update_db

          bootstrap_start_index = int(os.environ.get("NVD_BOOTSTRAP_START_INDEX", "300000"))
          original_iter_cves = ingest.iter_cves

          def iter_cves_with_bootstrap(*, start_index: int = 0, **kwargs):
              if start_index == 0 and not any(
                kwargs.get(name) is not None
                for name in ("last_mod_start", "last_mod_end", "pub_start", "pub_end")
              ):
                  start_index = bootstrap_start_index
              return original_iter_cves(start_index=start_index, **kwargs)

          ingest.iter_cves = iter_cves_with_bootstrap
          update_db.main(sleep_seconds=float(os.environ["NVD_SLEEP_SECONDS"]))
          PY

          uv run python backend/API/scripts/match_infrastructure.py

          if [[ "$SKIP_REASONING" != "true" ]]; then
            args=(uv run python backend/API/scripts/run_reasoning.py)
            if [[ "$REASONING_ALL" == "true" ]]; then
              args+=(--all)
            else
              args+=(--limit "$REASONING_LIMIT")
            fi
            "${args[@]}"
          fi

          uv run python backend/API/scripts/collect_artifacts.py --artifact-dir artifacts --nvd-sleep-seconds "$NVD_SLEEP_SECONDS" --skip-update --skip-match --skip-reasoning

      - name: Upload artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: nordcargo-artifacts-${{ github.run_id }}
          path: artifacts
          retention-days: 30

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4