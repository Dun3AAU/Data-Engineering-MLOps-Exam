name: Daily CVE update

on:
  schedule:
    - cron: '0 7 * * *' # daily at 07:00 UTC
  workflow_dispatch:
    inputs:
      nvd_sleep_seconds:
        description: "Delay between NVD page fetches"
        required: false
        default: "6"
      nvd_bootstrap_start_index:
        description: "NVD startIndex to use for bootstrap runs"
        required: false
        default: "250000"

permissions:
  contents: read

jobs:
  update-cves:
    runs-on: ubuntu-latest
    env:
      NVD_BOOTSTRAP_START_INDEX: "250000"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen
      - name: Run CVE updater
        env:
          NVD_SLEEP_SECONDS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.nvd_sleep_seconds || '6' }}
          NVD_BOOTSTRAP_START_INDEX: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.nvd_bootstrap_start_index || '250000' }}
        run: |
          uv run python backend/API/scripts/update_db.py \
            --sleep-seconds "$NVD_SLEEP_SECONDS" \
            --start-index "$NVD_BOOTSTRAP_START_INDEX"
